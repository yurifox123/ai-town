<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI小镇 - 多智能体模拟系统</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- 顶部标题栏 -->
    <header class="header">
      <h1>🤖 AI小镇</h1>
      <div class="status-bar">
        <span id="simulation-status" class="status stopped">已停止</span>
        <span id="game-time">--:--</span>
        <span id="tick-count">Tick: 0</span>
        <button id="btn-stop-server" class="btn btn-small btn-danger">🛑 停止服务器</button>
      </div>
    </header>

    <!-- 主内容区 -->
    <main class="main-content">
      <!-- 左侧：世界地图 -->
      <section class="map-section">
        <div class="section-header">
          <h2>🗺️ 世界地图</h2>
          <div class="map-controls">
            <button id="btn-start" class="btn btn-primary">▶️ 开始</button>
            <button id="btn-stop" class="btn btn-secondary" disabled>⏸️ 停止</button>
            <button id="btn-reset" class="btn btn-warning">🔄 重置</button>
          </div>
        </div>
        <div class="map-container">
          <canvas id="world-map"></canvas>
          <div id="map-tooltip" class="tooltip hidden"></div>
        </div>
        <div class="map-legend">
          <div class="legend-item"><span class="legend-color agent"></span> Agent</div>
          <div class="legend-item"><span class="legend-color building"></span> 建筑</div>
          <div class="legend-item"><span class="legend-color area"></span> 区域</div>
        </div>
      </section>

      <!-- 右侧：信息面板 -->
      <aside class="info-panel">
        <!-- Agent列表 -->
        <div class="panel-section">
          <h3>👥 Agent列表</h3>
          <div id="agent-list" class="agent-list">
            <div class="empty-state">等待初始化...</div>
          </div>
        </div>

        <!-- 事件日志 -->
        <div class="panel-section">
          <h3>📜 事件日志</h3>
          <div id="event-log" class="event-log">
            <div class="empty-state">暂无事件</div>
          </div>
        </div>

        <!-- 控制面板 -->
        <div class="panel-section">
          <h3>🎮 快捷操作</h3>
          <div class="quick-actions">
            <button id="btn-add-agent" class="btn btn-small">➕ 添加Agent</button>
            <button id="btn-trigger-event" class="btn btn-small">⚡ 触发事件</button>
            <button id="btn-clear-log" class="btn btn-small">🗑️ 清空日志</button>
          </div>
        </div>
      </aside>
    </main>

    <!-- Agent详情弹窗 -->
    <div id="agent-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modal-agent-name">Agent详情</h2>
          <button id="btn-close-modal" class="btn-close">×</button>
        </div>
        <div class="modal-body">
          <div class="agent-info">
            <div class="info-row">
              <span class="info-label">ID:</span>
              <span id="modal-agent-id" class="info-value"></span>
            </div>
            <div class="info-row">
              <span class="info-label">年龄:</span>
              <span id="modal-agent-age" class="info-value"></span>
            </div>
            <div class="info-row">
              <span class="info-label">性格:</span>
              <span id="modal-agent-traits" class="info-value"></span>
            </div>
            <div class="info-row">
              <span class="info-label">位置:</span>
              <span id="modal-agent-position" class="info-value"></span>
            </div>
            <div class="info-row">
              <span class="info-label">状态:</span>
              <span id="modal-agent-status" class="info-value"></span>
            </div>
            <div class="info-row">
              <span class="info-label">当前动作:</span>
              <span id="modal-agent-action" class="info-value"></span>
            </div>
          </div>
          <div class="agent-tabs">
            <button class="tab-btn active" data-tab="memories">🧠 记忆</button>
            <button class="tab-btn" data-tab="reflections">💭 反思</button>
            <button class="tab-btn" data-tab="background">📖 背景</button>
          </div>
          <div class="tab-content">
            <div id="tab-memories" class="tab-pane active">
              <div id="modal-memories" class="memory-list"></div>
            </div>
            <div id="tab-reflections" class="tab-pane">
              <div id="modal-reflections" class="memory-list"></div>
            </div>
            <div id="tab-background" class="tab-pane">
              <p id="modal-agent-background"></p>
              <h4>目标:</h4>
              <ul id="modal-agent-goals"></ul>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 添加Agent弹窗 -->
    <div id="add-agent-modal" class="modal hidden">
      <div class="modal-content modal-small">
        <div class="modal-header">
          <h2>➕ 添加新Agent</h2>
          <button id="btn-close-add-modal" class="btn-close">×</button>
        </div>
        <div class="modal-body">
          <form id="add-agent-form">
            <div class="form-group">
              <label for="new-agent-name">名称:</label>
              <input type="text" id="new-agent-name" required placeholder="输入Agent名称">
            </div>
            <div class="form-group">
              <label for="new-agent-age">年龄:</label>
              <input type="number" id="new-agent-age" min="1" max="120" value="25">
            </div>
            <div class="form-group">
              <label for="new-agent-traits">性格特点:</label>
              <textarea id="new-agent-traits" rows="2" placeholder="描述性格特点..."></textarea>
            </div>
            <div class="form-group">
              <label for="new-agent-background">背景故事:</label>
              <textarea id="new-agent-background" rows="3" placeholder="背景故事..."></textarea>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">确认添加</button>
              <button type="button" id="btn-cancel-add" class="btn btn-secondary">取消</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- 触发事件弹窗 -->
    <div id="event-modal" class="modal hidden">
      <div class="modal-content modal-small">
        <div class="modal-header">
          <h2>⚡ 触发世界事件</h2>
          <button id="btn-close-event-modal" class="btn-close">×</button>
        </div>
        <div class="modal-body">
          <form id="event-form">
            <div class="form-group">
              <label for="event-type">事件类型:</label>
              <select id="event-type">
                <option value="custom">自定义事件</option>
                <option value="weather">天气变化</option>
                <option value="accident">意外事件</option>
                <option value="announcement">公告</option>
              </select>
            </div>
            <div class="form-group">
              <label for="event-description">事件描述:</label>
              <textarea id="event-description" rows="3" required placeholder="描述发生了什么事件..."></textarea>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">触发事件</button>
              <button type="button" id="btn-cancel-event" class="btn btn-secondary">取消</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
